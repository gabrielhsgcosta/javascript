<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <main>
        <div id="conteudo">
            <div id="perguntas">
                <p>Ano de Nascimento: 
                    <input type="number" name="txtano" id="txtano" min="0">
                </p>
                <p>Sexo: 
                    <input type="radio" name="escolhasexo" id="mas" checked>
                    <label for="mas">Masculino</label>
                    <input type="radio" name="escolhasexo" id="fem">
                    <label for="fem">Feminino</label>
                </p>
                <p><input type="button" value="Verificar" onclick="verificar()" id="verificar"></p>
            </div>
            <div id="resultado">
                <p>Preencha os dados acima para ver o resultado.</p>
            </div>
        </div>
    </main>
    <footer>
        <a href="https://github.com/gabrielhsgcosta" target="_blank"><p>&copy Gabriel Henrique</p></a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
