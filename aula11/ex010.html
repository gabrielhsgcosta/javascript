<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistemas de Multas</h1>
    <p>Qual a velocidade do seu veículo?</p>
    <input type="number" name="txtvel" id="txtvel">
    <input type="button" value="Verificar" id="verificar" onclick="calcular()">
    <div id="res">

    </div>

    <script>
        function calcular() {
            var txtv = window.document.getElementById('txtvel')
            var res = window.document.querySelector('div#res')
            var vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}Km/h</strong></p>`
            if (vel > 60) {
                res.innerHTML += `Você ultrapassou a velocidade permitida. MULTADO!`
            }
             res.innerHTML += `<p>Dirija sempre utilizando cinto de segurança!</p>`
        }
    </script>
</body>
</html>
