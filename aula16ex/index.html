<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <main>
        <section id="conteudo">
            <div id="pergunta">
                <p>Número (entre 1 e 100): <input type="number" name="txtnum" id="txtnum"></p> 
                <input type="button" value="Adicionar" onclick="adicionar()" id="ad">
            </div>
            <div>
                <ul id="res"></ul>
                <p>
                    <input type="button" value="Finalizar" onclick="finalizar()" id="fim">
                </p>
                <div id="resultados">

                </div>
            </div>
        </section>
    </main>
    <footer>
        <a href="https://github.com/gabrielhsgcosta" target="_blank"><p>&copy Gabriel Henrique</p></a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
